<!-- BLOCK: Load/Aim/Shoot 3-phase methodology cards — stacked + draggable with GSAP -->
    <section class="section">
      <div class="utility-text-align-center utility-margin-bottom-4rem">
        <div class="eyebrow">Metodología de Trabajo</div>
        <h2 class="h1-heading">Nuestros objetivos son claros, pero ahora hablemos de los pasos a seguir:</h2>
        <p class="subheading">Un poco sobre mi metodología en diseño de identidad</p>
      </div>
      <style>
        .methodology-stack {
          position: relative;
          width: 100%;
          max-width: 100%;
          margin: 0 auto;
          height: 520px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .methodology-stack .card.stack-card {
          position: absolute;
          width: 380px;
          max-width: 85vw;
          min-height: 340px;
          cursor: grab;
          touch-action: none;
          user-select: none;
          will-change: transform;
          transition: box-shadow 0.25s ease;
        }
        .methodology-stack .card.stack-card:active {
          cursor: grabbing;
          box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .methodology-stack .card.stack-card .card-body {
          pointer-events: none;
        }
        .methodology-hint {
          text-align: center;
          margin-top: 1.5rem;
          font-size: 0.75rem;
          opacity: 0.35;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }
        @media (max-width: 767px) {
          .methodology-stack {
            max-width: 100%;
            height: 420px;
          }
          .methodology-stack .card.stack-card {
            min-height: 300px;
          }
        }
      </style>
      <div>
        <div class="container">
          <div class="methodology-stack" id="methodology-stack">
{{METHODOLOGY_CARDS}}
          </div>
          <div class="methodology-hint">Arrastra las tarjetas para explorar</div>
        </div>
      </div>
      <script>
        window.addEventListener('load', function() {
          var stack = document.getElementById('methodology-stack');
          if (!stack || typeof gsap === 'undefined' || typeof Draggable === 'undefined') return;

          var cards = stack.querySelectorAll('.stack-card');
          var total = cards.length;
          var topZ = total + 10;

          // Initial stacking: tight pile, cards will spread on scroll
          var spreadOffsets = [];
          cards.forEach(function(card, i) {
            var angle = (Math.random() - 0.5) * 8;
            var offsetX = (Math.random() - 0.5) * 20;
            spreadOffsets.push({
              angle: angle,
              stackX: offsetX,
              stackY: i * 4,
              // Spread positions: fan out horizontally
              spreadX: (i - (total - 1) / 2) * (Math.min(window.innerWidth, 1200) / (total + 0.5)),
              spreadY: (Math.random() - 0.5) * 30,
              spreadAngle: (Math.random() - 0.5) * 6
            });
            gsap.set(card, {
              rotation: angle,
              x: offsetX,
              y: i * 4,
              zIndex: total - i,
              scale: 1
            });
          });

          // Spread cards when section scrolls into view
          var hasSpread = false;
          var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting && !hasSpread) {
                hasSpread = true;
                cards.forEach(function(card, i) {
                  var s = spreadOffsets[i];
                  gsap.to(card, {
                    x: s.spreadX,
                    y: s.spreadY,
                    rotation: s.spreadAngle,
                    duration: 0.8,
                    delay: i * 0.1,
                    ease: 'back.out(1.2)'
                  });
                });
              }
            });
          }, { threshold: 0.3 });
          observer.observe(stack);

          // Make each card draggable
          Draggable.create(cards, {
            type: 'x,y',
            edgeResistance: 0.55,
            onPress: function() {
              topZ++;
              gsap.to(this.target, {
                zIndex: topZ,
                scale: 1.04,
                boxShadow: '0 25px 60px rgba(0,0,0,0.45)',
                duration: 0.25,
                ease: 'power2.out',
                overwrite: 'auto'
              });
            },
            onRelease: function() {
              gsap.to(this.target, {
                scale: 1,
                boxShadow: '',
                duration: 0.4,
                ease: 'elastic.out(1, 0.5)',
                overwrite: 'auto'
              });
            },
            onDrag: function() {
              // Subtle tilt based on drag velocity
              var vx = this.getDirection ? 0 : (this.deltaX || 0);
              gsap.to(this.target, {
                rotation: vx * 0.15,
                duration: 0.3,
                overwrite: 'auto'
              });
            }
          });

          // Double-click to send card back to pile
          cards.forEach(function(card) {
            card.addEventListener('dblclick', function() {
              var angle = (Math.random() - 0.5) * 12;
              gsap.to(card, {
                x: (Math.random() - 0.5) * 30,
                y: (Math.random() - 0.5) * 20,
                rotation: angle,
                duration: 0.6,
                ease: 'back.out(1.7)'
              });
            });
          });
        });
      </script>
    </section>
