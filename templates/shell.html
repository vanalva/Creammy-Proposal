<!DOCTYPE html>
<html lang="{{language}}">
<head>
  <meta charset="utf-8">
  <title>{{clientName}}</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&display=swap" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
  <script>WebFont.load({ google: { families: ["Montserrat:100,100italic,200,200italic,300,300italic,400,400italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic","Inter:regular","Syne:regular"] } });</script>

  <link href="../images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="../images/webclip.png" rel="apple-touch-icon">

  <!-- Styles -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

  <!-- Password gate -->
  <div id="password-gate" style="position:fixed;inset:0;z-index:99999;background:#0c0c16;display:flex;align-items:center;justify-content:center;">
    <div style="text-align:center;max-width:360px;padding:2rem;">
      <img src="../images/favicon.png" alt="" style="width:40px;margin-bottom:2rem;opacity:0.4;">
      <p style="color:rgba(255,255,255,0.4);font-family:Montserrat,sans-serif;font-size:0.8rem;margin-bottom:1.5rem;letter-spacing:0.05em;">Introduce la clave para acceder a esta propuesta</p>
      <input id="pw-input" type="password" placeholder="Clave de acceso" autocomplete="off"
        style="width:100%;padding:0.8rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-family:'Cascadia Code',monospace;font-size:0.9rem;text-align:center;outline:none;"
        onkeydown="if(event.key==='Enter')document.getElementById('pw-btn').click()">
      <button id="pw-btn" onclick="checkPw()"
        style="width:100%;margin-top:1rem;padding:0.7rem;background:#f0ff3d;color:#000;border:none;border-radius:6px;font-family:Montserrat,sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Acceder</button>
      <p id="pw-error" style="color:#ff4444;font-size:0.75rem;margin-top:1rem;display:none;font-family:Montserrat,sans-serif;">Clave incorrecta</p>
    </div>
  </div>
  <script>
    function checkPw(){
      var input = document.getElementById('pw-input').value.trim().toLowerCase();
      var key = '{{clientName}}'.toLowerCase();
      if(input === key){
        document.getElementById('password-gate').style.display='none';
        sessionStorage.setItem('pw-ok-{{proposalId}}','1');
      } else {
        document.getElementById('pw-error').style.display='block';
        document.getElementById('pw-input').style.borderColor='#ff4444';
      }
    }
    if(sessionStorage.getItem('pw-ok-{{proposalId}}')==='1'){
      document.getElementById('password-gate').style.display='none';
    }
  </script>

  <div class="page-wrapper" style="display:none;" id="proposal-content">
{{BLOCKS}}
  </div>

{{MODALS}}

  <script>
    // Show content after password or if already authenticated
    if(sessionStorage.getItem('pw-ok-{{proposalId}}')==='1'){
      document.getElementById('proposal-content').style.display='';
    } else {
      var obs = new MutationObserver(function(){
        if(document.getElementById('password-gate').style.display==='none'){
          document.getElementById('proposal-content').style.display='';
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('password-gate'),{attributes:true});
    }
  </script>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="../js/animations.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="../js/swiper-init.js"></script>
  <script src="../js/tabs.js"></script>
  <script src="js/pricing-config.js"></script>
  <script src="../js/pricing.js"></script>
</body>
</html>
