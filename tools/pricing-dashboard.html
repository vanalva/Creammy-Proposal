// ── GRAPH VIEW ──
let graphInitialized = false;
let nodes = [];
let edges = [];
let dragging = null;
let hoveredNode = null;
let selectedNode = null; // isolate mode
let graphFilters = {
  categories: new Set(), // active categories (empty = all)
  edgeTypes: new Set(['includes','included','free','discount','excludes','promo']),
  hideHubs: false,
  hubIds: ['the-full-pot', 'shakefront-full'],
};

function buildGraphFilters() {
  const bar = document.getElementById('graph-filters');
  const categories = [...new Set(Object.values(SERVICES).map(s => s.category))];

  let html = '';

  // Category filters
  html += '<span class="filter-group-label">Categories</span><div class="filter-group">';
  for (const cat of categories) {
    const meta = CATEGORY_META[cat] || { label: cat, color: '#888' };
    const active = graphFilters.categories.size === 0 || graphFilters.categories.has(cat);
    html += `<button class="filter-btn ${active ? 'active' : ''}" data-filter="cat" data-value="${cat}">
      <span class="dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  }
  html += '</div>';

  // Edge type filters
  html += '<span class="filter-group-label">Lines</span><div class="filter-group">';
  const edgeTypes = [
    { id: 'includes', label: 'Includes', color: 'var(--green)' },
    { id: 'free', label: 'Free', color: 'var(--cyan)' },
    { id: 'discount', label: 'Discount', color: 'var(--orange)' },
    { id: 'excludes', label: 'Excludes', color: 'var(--red)' },
    { id: 'promo', label: 'Promo', color: 'var(--purple)' },
  ];
  for (const et of edgeTypes) {
    const active = graphFilters.edgeTypes.has(et.id);
    html += `<button class="filter-btn ${active ? 'active' : ''}" data-filter="edge" data-value="${et.id}">
      <span class="filter-btn-line" style="background:${et.color}"></span>${et.label}
    </button>`;
  }
  html += '</div>';

  // Toggle options
  html += `<button class="filter-toggle ${graphFilters.hideHubs ? 'active' : ''}" data-filter="hubs">Hide mega-hubs</button>`;
  html += `<button class="filter-toggle" data-filter="reset">Reset all</button>`;

  bar.innerHTML = html;

  // Event listeners
  bar.querySelectorAll('[data-filter="cat"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cat = btn.dataset.value;
      if (graphFilters.categories.size === 0) {
        // First click: activate only this category
        graphFilters.categories = new Set([cat]);
      } else if (graphFilters.categories.has(cat)) {
        graphFilters.categories.delete(cat);
        if (graphFilters.categories.size === 0) graphFilters.categories = new Set(); // all
      } else {
        graphFilters.categories.add(cat);
      }
      buildGraphFilters();
    });
  });

  bar.querySelectorAll('[data-filter="edge"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.value;
      if (graphFilters.edgeTypes.has(type)) graphFilters.edgeTypes.delete(type);
      else graphFilters.edgeTypes.add(type);
      buildGraphFilters();
    });
  });

  bar.querySelector('[data-filter="hubs"]').addEventListener('click', () => {
    graphFilters.hideHubs = !graphFilters.hideHubs;
    buildGraphFilters();
  });

  bar.querySelector('[data-filter="reset"]').addEventListener('click', () => {
    graphFilters.categories = new Set();
    graphFilters.edgeTypes = new Set(['includes','included','free','discount','excludes','promo']);
    graphFilters.hideHubs = false;
    selectedNode = null;
    buildGraphFilters();
  });
}

function isNodeVisible(n) {
  if (graphFilters.hideHubs && graphFilters.hubIds.includes(n.id)) return false;
  if (graphFilters.categories.size > 0 && !graphFilters.categories.has(n.category)) return false;
  if (selectedNode && selectedNode !== n) {
    // In isolate mode, only show direct connections
    const isConnected = edges.some(e =>
      (e.from === selectedNode.id && e.to === n.id) ||
      (e.to === selectedNode.id && e.from === n.id)
    );
    if (!isConnected) return false;
  }
  return true;
}

function isEdgeVisible(e) {
  const typeMap = { 'includes': 'includes', 'included': 'includes', 'free': 'free', 'discount': 'discount', 'excludes': 'excludes', 'promo': 'promo' };
  const mapped = typeMap[e.type] || e.type;
  if (!graphFilters.edgeTypes.has(mapped)) return false;
  const fromNode = nodes.find(n => n.id === e.from);
  const toNode = nodes.find(n => n.id === e.to);
  if (!fromNode || !toNode) return false;
  if (!isNodeVisible(fromNode) || !isNodeVisible(toNode)) return false;
  return true;
}

function initGraph() {
  if (graphInitialized) return;
  graphInitialized = true;

  buildGraphFilters();

  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('graph-container');

  let zoom = 1;
  let panOffX = 0, panOffY = 0;
  let isPanning = false, panStartX = 0, panStartY = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = container.clientWidth * dpr;
    canvas.height = container.clientHeight * dpr;
    canvas.style.width = container.clientWidth + 'px';
    canvas.style.height = container.clientHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  const W = container.clientWidth;
  const H = container.clientHeight;
  const centerX = W / 2;
  const centerY = H / 2;

  // Convert screen coords to world coords
  function screenToWorld(sx, sy) {
    return { x: (sx - panOffX) / zoom, y: (sy - panOffY) / zoom };
  }
  function worldToScreen(wx, wy) {
    return { x: wx * zoom + panOffX, y: wy * zoom + panOffY };
  }

  // Create nodes
  const svcs = Object.values(SERVICES);
  const catPositions = {};
  const categories = [...new Set(svcs.map(s => s.category))];
  const angleStep = (Math.PI * 2) / categories.length;

  categories.forEach((cat, i) => {
    catPositions[cat] = {
      x: centerX + Math.cos(angleStep * i - Math.PI/2) * Math.min(W, H) * 0.3,
      y: centerY + Math.sin(angleStep * i - Math.PI/2) * Math.min(W, H) * 0.3,
    };
  });

  nodes = svcs.map((svc, i) => {
    const catPos = catPositions[svc.category] || { x: centerX, y: centerY };
    const jitter = 60;
    return {
      id: svc.id,
      name: svc.name,
      category: svc.category,
      price: svc.pricing.basePrice,
      color: (CATEGORY_META[svc.category] || {}).color || '#888',
      x: catPos.x + (Math.random() - 0.5) * jitter,
      y: catPos.y + (Math.random() - 0.5) * jitter,
      vx: 0, vy: 0,
      radius: Math.max(8, Math.min(25, Math.sqrt((svc.pricing.basePrice || 500) / 50))),
      svc,
    };
  });

  // Create edges
  edges = [];
  for (const svc of svcs) {
    const br = svc.bundleRules || {};
    if (br.includes) br.includes.forEach(t => edges.push({ from: svc.id, to: t, type: 'includes', color: '#4ade80' }));
    if (br.includedWith) br.includedWith.forEach(t => edges.push({ from: t, to: svc.id, type: 'included', color: '#4ade80' }));
    if (br.freeWith) br.freeWith.forEach(t => edges.push({ from: t, to: svc.id, type: 'free', color: '#22d3ee' }));
    if (br.discountedWith) Object.keys(br.discountedWith).forEach(t => edges.push({ from: t, to: svc.id, type: 'discount', color: '#fb923c' }));
    if (br.promoWith) Object.keys(br.promoWith).forEach(t => edges.push({ from: t, to: svc.id, type: 'promo', color: '#a78bfa' }));
    if (svc.mutuallyExclusiveWith) svc.mutuallyExclusiveWith.forEach(t => {
      if (svc.id < t) edges.push({ from: svc.id, to: t, type: 'excludes', color: '#f87171' });
    });
  }
  // Deduplicate edges
  const edgeKey = e => [e.from, e.to, e.type].sort().join('|');
  const seen = new Set();
  edges = edges.filter(e => { const k = edgeKey(e); if (seen.has(k)) return false; seen.add(k); return true; });

  // Physics simulation
  function simulate() {
    const k = 0.001; // attraction to category center
    const repulsion = 2000;
    const edgeForce = 0.01;
    const damping = 0.85;

    for (const n of nodes) {
      // Attract to category center
      const cp = catPositions[n.category];
      if (cp) {
        n.vx += (cp.x - n.x) * k;
        n.vy += (cp.y - n.y) * k;
      }

      // Repel from other nodes
      for (const m of nodes) {
        if (n === m) continue;
        const dx = n.x - m.x;
        const dy = n.y - m.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        if (dist < 200) {
          const f = repulsion / (dist * dist);
          n.vx += (dx / dist) * f;
          n.vy += (dy / dist) * f;
        }
      }
    }

    // Edge attraction
    for (const e of edges) {
      const a = nodes.find(n => n.id === e.from);
      const b = nodes.find(n => n.id === e.to);
      if (!a || !b) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      a.vx += dx * edgeForce;
      a.vy += dy * edgeForce;
      b.vx -= dx * edgeForce;
      b.vy -= dy * edgeForce;
    }

    for (const n of nodes) {
      if (n === dragging) continue;
      n.vx *= damping;
      n.vy *= damping;
      n.x += n.vx;
      n.y += n.vy;
      // Bounds
      n.x = Math.max(40, Math.min(W - 40, n.x));
      n.y = Math.max(40, Math.min(H - 40, n.y));
    }
  }

  function draw() {
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.translate(panOffX, panOffY);
    ctx.scale(zoom, zoom);

    const activeNode = selectedNode || hoveredNode;

    // Edges — invisible by default, show on hover/select
    for (const e of edges) {
      if (!isEdgeVisible(e)) continue;
      const a = nodes.find(n => n.id === e.from);
      const b = nodes.find(n => n.id === e.to);
      if (!a || !b) continue;

      const isActive = activeNode && (activeNode.id === a.id || activeNode.id === b.id);

      // Lines only visible when hovering/selecting a node
      if (!activeNode) continue;
      if (!isActive) continue;

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = e.color;
      ctx.globalAlpha = 0.7;
      ctx.lineWidth = e.type === 'excludes' || e.type === 'discount' || e.type === 'promo' ? 1.5 : 2.5;
      if (e.type === 'excludes') ctx.setLineDash([6, 4]);
      else if (e.type === 'discount' || e.type === 'promo') ctx.setLineDash([3, 3]);
      else ctx.setLineDash([]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw edge label at midpoint
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      const label = e.type === 'includes' || e.type === 'included' ? 'INC'
        : e.type === 'free' ? 'FREE'
        : e.type === 'discount' ? 'DTO'
        : e.type === 'excludes' ? 'X'
        : e.type === 'promo' ? 'PROMO' : '';
      ctx.globalAlpha = 0.9;
      ctx.font = '600 7px Inter, sans-serif';
      ctx.fillStyle = e.color;
      ctx.textAlign = 'center';
      ctx.fillText(label, mx, my - 4);

      ctx.globalAlpha = 1;
    }

    // Nodes
    for (const n of nodes) {
      const visible = isNodeVisible(n);
      if (!visible) {
        // Draw ghost
        ctx.globalAlpha = 0.06;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#555';
        ctx.fill();
        ctx.globalAlpha = 1;
        continue;
      }

      const isHovered = hoveredNode === n;
      const isSelected = selectedNode === n;
      const isConnected = activeNode && edges.some(e =>
        ((e.from === activeNode.id && e.to === n.id) || (e.to === activeNode.id && e.from === n.id)) && isEdgeVisible(e)
      );
      const dimmed = activeNode && !isHovered && !isSelected && !isConnected;
      const alpha = dimmed ? 0.15 : 1;

      ctx.globalAlpha = alpha;

      // Glow for selected
      if (isSelected) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius + 6, 0, Math.PI * 2);
        ctx.fillStyle = n.color;
        ctx.globalAlpha = 0.15;
        ctx.fill();
        ctx.globalAlpha = alpha;
      }

      ctx.beginPath();
      ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
      ctx.fillStyle = n.color;
      ctx.fill();

      if (isHovered || isSelected) {
        ctx.strokeStyle = isSelected ? '#f0ff3d' : '#fff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Label
      ctx.fillStyle = dimmed ? '#444' : '#fff';
      ctx.font = (isHovered || isSelected) ? '600 11px Inter, sans-serif' : '400 9px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.name, n.x, n.y + n.radius + 14);

      if (n.price && !dimmed) {
        ctx.fillStyle = n.color;
        ctx.font = '600 8px Inter, sans-serif';
        ctx.fillText('\u20AC' + n.price.toLocaleString(), n.x, n.y + n.radius + 24);
      }

      ctx.globalAlpha = 1;
    }

    // Category labels (when no node is active)
    if (!activeNode) {
      ctx.globalAlpha = 0.3;
      ctx.font = '700 11px Inter, sans-serif';
      ctx.textAlign = 'center';
      for (const [cat, pos] of Object.entries(catPositions)) {
        const meta = CATEGORY_META[cat] || { label: cat, color: '#888' };
        if (graphFilters.categories.size > 0 && !graphFilters.categories.has(cat)) continue;
        ctx.fillStyle = meta.color;
        ctx.fillText(meta.label.toUpperCase(), pos.x, pos.y - Math.min(W,H)*0.12);
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Zoom indicator (outside transform)
    ctx.globalAlpha = 0.4;
    ctx.font = '500 10px Inter, sans-serif';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(zoom * 100) + '%', W - 12, H - 12);
    ctx.globalAlpha = 1;
  }

  function loop() {
    simulate();
    draw();
    requestAnimationFrame(loop);
  }
  loop();

  // Mouse interaction
  let dragStartX = 0, dragStartY = 0, didDrag = false;

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;
    const world = screenToWorld(sx, sy);
    const mx = world.x, my = world.y;

    // Panning with middle mouse or right-click drag
    if (isPanning) {
      panOffX += e.movementX;
      panOffY += e.movementY;
      canvas.style.cursor = 'move';
      return;
    }

    if (dragging) {
      dragging.x = mx;
      dragging.y = my;
      dragging.vx = 0;
      dragging.vy = 0;
      if (Math.abs(sx - dragStartX) > 3 || Math.abs(sy - dragStartY) > 3) didDrag = true;
      return;
    }

    hoveredNode = null;
    for (const n of nodes) {
      if (!isNodeVisible(n)) continue;
      const dx = mx - n.x;
      const dy = my - n.y;
      if (Math.sqrt(dx*dx + dy*dy) < (n.radius + 5) / zoom) {
        hoveredNode = n;
        break;
      }
    }

    const tooltip = document.getElementById('graph-tooltip');
    if (hoveredNode) {
      canvas.style.cursor = 'pointer';
      const s = hoveredNode.svc;
      const p = s.pricing;
      const br = s.bundleRules || {};

      // Count connections
      const connections = edges.filter(e => e.from === s.id || e.to === s.id);
      let connHtml = '';
      if (connections.length) {
        connHtml = '<div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid rgba(255,255,255,0.1);font-size:0.65rem;">';
        for (const c of connections.slice(0, 5)) {
          const otherId = c.from === s.id ? c.to : c.from;
          const other = SERVICES[otherId];
          const typeLabel = c.type === 'includes' || c.type === 'included' ? 'INC' : c.type === 'free' ? 'FREE' : c.type === 'discount' ? 'DTO' : c.type === 'excludes' ? 'EXCL' : 'PROMO';
          connHtml += '<div style="color:' + c.color + ';">' + typeLabel + ' ' + (other?.name || otherId) + '</div>';
        }
        if (connections.length > 5) connHtml += '<div style="color:var(--text-dim);">+' + (connections.length - 5) + ' more</div>';
        connHtml += '</div>';
      }

      // Variants info
      let varHtml = '';
      if (p.priceVariants) {
        const count = Object.keys(p.priceVariants).length;
        varHtml = '<div style="font-size:0.6rem;color:var(--text-dim);margin-top:0.25rem;">' + count + ' price variants</div>';
      }

      tooltip.innerHTML =
        '<div style="font-weight:700;margin-bottom:0.25rem;color:' + hoveredNode.color + '">' + s.name + '</div>' +
        '<div style="font-size:0.7rem;color:#8a8272;margin-bottom:0.5rem;">' + (s.subtitle || '') + '</div>' +
        '<div style="font-size:0.9rem;font-weight:700;color:#f0ff3d;">' + (p.basePrice ? '\u20AC' + p.basePrice.toLocaleString() : 'Custom') + (p.monthly ? '/mes' : '') + '</div>' +
        (p.priceRange ? '<div style="font-size:0.65rem;color:#8a8272;">Range: \u20AC' + p.priceRange.min.toLocaleString() + ' \u2013 \u20AC' + p.priceRange.max.toLocaleString() + '</div>' : '') +
        varHtml + connHtml +
        '<div style="font-size:0.55rem;color:#555;margin-top:0.5rem;">Click to isolate</div>';

      tooltip.classList.add('visible');
      tooltip.style.left = (e.clientX - container.getBoundingClientRect().left + 15) + 'px';
      tooltip.style.top = (e.clientY - container.getBoundingClientRect().top - 10) + 'px';
    } else {
      canvas.style.cursor = selectedNode ? 'pointer' : 'default';
      tooltip.classList.remove('visible');
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    dragStartX = e.clientX - rect.left;
    dragStartY = e.clientY - rect.top;
    didDrag = false;

    // Middle click or right click → pan
    if (e.button === 1 || e.button === 2) {
      isPanning = true;
      e.preventDefault();
      return;
    }

    if (hoveredNode) {
      dragging = hoveredNode;
      canvas.style.cursor = 'grabbing';
    } else {
      // Left click on empty space → start panning
      isPanning = true;
    }
  });

  canvas.addEventListener('mouseup', (e) => {
    if (isPanning) {
      isPanning = false;
      canvas.style.cursor = 'default';
      // If we barely moved, treat as click to deselect
      const rect = canvas.getBoundingClientRect();
      const dx = Math.abs((e.clientX - rect.left) - dragStartX);
      const dy = Math.abs((e.clientY - rect.top) - dragStartY);
      if (dx < 3 && dy < 3 && !hoveredNode) {
        selectedNode = null;
      }
      return;
    }

    if (!didDrag) {
      // Click — toggle isolate
      if (hoveredNode) {
        selectedNode = (selectedNode === hoveredNode) ? null : hoveredNode;
      } else {
        selectedNode = null;
      }
    }
    dragging = null;
    canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
  });

  // Prevent context menu on right click
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  // Scroll wheel zoom — zoom toward cursor
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    const oldZoom = zoom;
    const zoomFactor = e.deltaY < 0 ? 1.12 : 0.89;
    zoom = Math.max(0.2, Math.min(5, zoom * zoomFactor));

    // Zoom toward cursor position
    panOffX = sx - (sx - panOffX) * (zoom / oldZoom);
    panOffY = sy - (sy - panOffY) * (zoom / oldZoom);
  }, { passive: false });

  // Double-click to reset zoom
  canvas.addEventListener('dblclick', () => {
    zoom = 1;
    panOffX = 0;
    panOffY = 0;
    selectedNode = null;
  });

  window.addEventListener('resize', resize);
}

// ── View Switching ──
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  event.target.classList.add('active');

  if (view === 'graph') initGraph();
  if (view === 'builder' && !builderInitialized) initBuilder();
}

// ── PACKAGE BUILDER ──
let builderInitialized = false;
let builderSelected = {}; // { svcId: { variant: 'standard', overridePrice: null } }
let savedTemplates = []; // loaded from file via API or embedded data

async function initBuilder() {
  builderInitialized = true;
  // Load templates from API or embedded data
  if (IS_SERVER) {
    try {
      const res = await fetch('/api/packages');
      const data = await res.json();
      savedTemplates = data.templates || [];
    } catch(e) { console.warn('Failed to load packages:', e); }
  } else {
    const embedded = typeof EMBEDDED_PACKAGES !== 'undefined' ? EMBEDDED_PACKAGES : {};
    savedTemplates = embedded.templates || [];
  }
  renderBuilder();
}

function renderBuilder() {
  const container = document.getElementById('view-builder');
  const svcs = Object.entries(SERVICES);
  const groups = {};
  for (const [id, svc] of svcs) {
    const cat = svc.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ id, ...svc });
  }

  let servicesHtml = '';
  for (const [cat, items] of Object.entries(groups)) {
    const meta = CATEGORY_META[cat] || { label: cat, color: '#888' };
    servicesHtml += `<div style="margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
        <div style="width:8px;height:8px;border-radius:50%;background:${meta.color}"></div>
        <span style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">${meta.label}</span>
      </div>
      <div class="builder-svc-grid">
        ${items.map(s => renderBuilderItem(s)).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = `
    <div class="builder-layout">
      <div class="builder-services">
        <h2 style="font-size:1rem;margin-bottom:0.25rem;">Select Services</h2>
        <p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:1.5rem;">Click to add/remove. Bundle discounts apply automatically.</p>
        ${servicesHtml}
      </div>
      <div class="builder-sidebar">
        <div class="pkg-summary-card">
          <input class="pkg-meta-input" id="pkg-name" placeholder="Package name (e.g. Azorica Voyager)" value="">
          <input class="pkg-meta-input" id="pkg-subtitle" placeholder="Subtitle (e.g. Marca + Web + Booking)" value="">
          <input class="pkg-meta-input" id="pkg-eyebrow" placeholder="Eyebrow (e.g. BRAND + WEB + CMS)" value="">
          <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <label style="font-size:0.7rem;color:var(--text-dim);display:flex;align-items:center;gap:0.25rem;">
              <input type="checkbox" id="pkg-recommended"> Recommended
            </label>
            <input class="pkg-meta-input" id="pkg-promo" placeholder="Promo text (optional)" style="margin-bottom:0;flex:1;">
          </div>
          <div id="pkg-lines"></div>
          <div id="pkg-totals"></div>
          <div class="pkg-actions">
            <button class="pkg-btn pkg-btn-primary" onclick="saveTemplate()">Save Template</button>
            <button class="pkg-btn pkg-btn-secondary" onclick="exportJSON()">Copy JSON</button>
            <button class="pkg-btn pkg-btn-secondary" onclick="clearBuilder()">Clear</button>
          </div>
        </div>
        <div class="saved-templates" id="saved-templates"></div>
      </div>
    </div>`;

  renderSavedTemplates();
}

function renderBuilderItem(svc) {
  const sel = builderSelected[svc.id];
  const isSelected = !!sel;
  const p = svc.pricing;
  const price = p.basePrice ? `€${p.basePrice.toLocaleString()}` : 'Custom';
  const monthly = p.monthly ? '/mes' : '';

  // Check if auto-included/free
  const autoStatus = getAutoStatus(svc.id);
  const statusHtml = autoStatus.type === 'included'
    ? '<span class="svc-status status-included">INCLUIDO</span>'
    : autoStatus.type === 'free'
    ? '<span class="svc-status status-free">GRATIS</span>'
    : autoStatus.type === 'discount'
    ? `<span class="svc-status status-discount">€${autoStatus.price}</span>`
    : '';

  // Mutual exclusion check
  const excluded = svc.mutuallyExclusiveWith?.some(ex => builderSelected[ex]);
  const cls = excluded ? 'disabled' : isSelected ? 'selected' : '';

  // Variant buttons
  let variantHtml = '';
  if (isSelected && p.priceVariants) {
    const currentVariant = sel.variant || 'default';
    variantHtml = '<div class="builder-variant-select">';
    variantHtml += `<button class="variant-btn ${currentVariant === 'default' ? 'active' : ''}" onclick="event.stopPropagation();setVariant('${svc.id}','default')">Base €${p.basePrice?.toLocaleString() || '?'}</button>`;
    for (const [vName, vPrice] of Object.entries(p.priceVariants)) {
      variantHtml += `<button class="variant-btn ${currentVariant === vName ? 'active' : ''}" onclick="event.stopPropagation();setVariant('${svc.id}','${vName}')">
        ${vName} €${vPrice.toLocaleString()}
      </button>`;
    }
    variantHtml += '</div>';
  }

  return `<div class="builder-svc-item ${cls}" onclick="toggleService('${svc.id}')" data-svc-id="${svc.id}">
    <div class="svc-info">
      <div class="cat">${svc.eyebrow || svc.category}</div>
      <div class="name">${svc.name}</div>
      ${variantHtml}
    </div>
    <div style="text-align:right;">
      <div class="svc-price-tag">${price}${monthly}</div>
      ${statusHtml}
    </div>
  </div>`;
}

function getAutoStatus(svcId) {
  const svc = SERVICES[svcId];
  if (!svc) return { type: null };
  const br = svc.bundleRules || {};
  const selectedIds = Object.keys(builderSelected);

  // Check if included with any selected service
  if (br.includedWith?.some(s => selectedIds.includes(s))) return { type: 'included' };

  // Check if another selected service includes this one
  for (const selId of selectedIds) {
    const selSvc = SERVICES[selId];
    if (selSvc?.bundleRules?.includes?.includes(svcId)) return { type: 'included' };
  }

  // Check if free with
  if (br.freeWith?.some(s => selectedIds.includes(s))) return { type: 'free' };

  // Check if discounted
  if (br.discountedWith) {
    for (const [trigger, price] of Object.entries(br.discountedWith)) {
      if (selectedIds.includes(trigger)) return { type: 'discount', price };
    }
  }

  // Check bundleDiscounts from discounts.json
  const discRules = DISCOUNTS.bundleDiscounts || [];
  for (const rule of discRules) {
    if (rule.target !== svcId) continue;
    const trigger = rule.trigger;
    const triggerMet = (trigger.selected && selectedIds.includes(trigger.selected)) ||
      (trigger.anySelected && trigger.anySelected.some(s => selectedIds.includes(s)));
    if (triggerMet) {
      if (rule.effect.type === 'included') return { type: 'included' };
      if (rule.effect.type === 'free') return { type: 'free' };
      if (rule.effect.type === 'discount') return { type: 'discount', price: rule.effect.price };
    }
  }

  return { type: null };
}

function toggleService(svcId) {
  if (builderSelected[svcId]) {
    delete builderSelected[svcId];
  } else {
    builderSelected[svcId] = { variant: 'default', overridePrice: null };
  }
  refreshBuilder();
}

function setVariant(svcId, variant) {
  if (builderSelected[svcId]) {
    builderSelected[svcId].variant = variant;
  }
  refreshBuilder();
}

function refreshBuilder() {
  // Re-render service items
  document.querySelectorAll('.builder-svc-item').forEach(el => {
    const id = el.dataset.svcId;
    if (!id) return;
    const svc = SERVICES[id];
    if (!svc) return;

    const isSelected = !!builderSelected[id];
    const excluded = svc.mutuallyExclusiveWith?.some(ex => builderSelected[ex]);

    el.className = 'builder-svc-item' + (excluded ? ' disabled' : isSelected ? ' selected' : '');

    const autoStatus = getAutoStatus(id);
    const statusEl = el.querySelector('.svc-status');
    if (statusEl) statusEl.remove();

    if (autoStatus.type && !isSelected) {
      const priceDiv = el.querySelector('[style*="text-align:right"]') || el.querySelector('.svc-price-tag')?.parentElement;
      if (priceDiv) {
        const span = document.createElement('span');
        span.className = 'svc-status status-' + (autoStatus.type === 'discount' ? 'discount' : autoStatus.type);
        span.textContent = autoStatus.type === 'included' ? 'INCLUIDO' : autoStatus.type === 'free' ? 'GRATIS' : `€${autoStatus.price}`;
        priceDiv.appendChild(span);
      }
    }
  });

  // Render summary
  renderPkgSummary();
}

function getEffectivePrice(svcId) {
  const svc = SERVICES[svcId];
  if (!svc) return 0;
  const sel = builderSelected[svcId];
  const p = svc.pricing;

  // Check variant
  let basePrice = p.basePrice || 0;
  if (sel?.variant && sel.variant !== 'default' && p.priceVariants?.[sel.variant]) {
    basePrice = p.priceVariants[sel.variant];
  }

  // Check auto status
  const status = getAutoStatus(svcId);
  if (status.type === 'included') return { effective: 0, base: basePrice, label: 'INCLUIDO', monthly: false };
  if (status.type === 'free') return { effective: 0, base: basePrice, label: 'GRATIS', monthly: false };
  if (status.type === 'discount') return { effective: status.price, base: basePrice, label: null, monthly: p.monthly };

  return { effective: basePrice, base: basePrice, label: null, monthly: p.monthly };
}

function renderPkgSummary() {
  const linesEl = document.getElementById('pkg-lines');
  const totalsEl = document.getElementById('pkg-totals');
  const selectedIds = Object.keys(builderSelected);

  if (!selectedIds.length) {
    linesEl.innerHTML = '<p style="font-size:0.75rem;color:var(--text-dim);padding:1rem 0;text-align:center;">No services selected</p>';
    totalsEl.innerHTML = '';
    return;
  }

  // Also include auto-included services
  const allIds = [...selectedIds];
  for (const [id, svc] of Object.entries(SERVICES)) {
    if (allIds.includes(id)) continue;
    const status = getAutoStatus(id);
    if (status.type === 'included' || status.type === 'free') {
      allIds.push(id);
    }
  }

  let linesHtml = '';
  let totalOneTime = 0;
  let totalMonthly = 0;
  let totalBase = 0;

  for (const id of allIds) {
    const svc = SERVICES[id];
    if (!svc) continue;
    const ep = getEffectivePrice(id);
    totalBase += ep.base;

    if (ep.monthly) {
      totalMonthly += ep.effective;
    } else {
      totalOneTime += ep.effective;
    }

    const originalHtml = ep.base !== ep.effective ? `<span class="original">€${ep.base.toLocaleString()}</span>` : '';
    const labelHtml = ep.label ? `<span class="status-label" style="color:${ep.label === 'INCLUIDO' ? 'var(--green)' : ep.label === 'GRATIS' ? 'var(--cyan)' : 'var(--yellow)'}">${ep.label}</span>` : '';
    const effectiveHtml = ep.label ? labelHtml : `<span class="effective">€${ep.effective.toLocaleString()}${ep.monthly ? '/mes' : ''}</span>`;

    linesHtml += `<div class="pkg-line-item">
      <span>${svc.name}</span>
      <span>${originalHtml}${effectiveHtml}</span>
    </div>`;
  }

  linesEl.innerHTML = linesHtml;

  const savings = totalBase - totalOneTime - totalMonthly;
  const monthlyHtml = totalMonthly > 0 ? `<div style="font-size:0.8rem;color:var(--text-dim);text-align:right;">+ €${totalMonthly.toLocaleString()}/mes</div>` : '';
  const savingsHtml = savings > 0 ? `<div class="pkg-savings">Ahorro: €${savings.toLocaleString()} vs. individual</div>` : '';

  totalsEl.innerHTML = `
    <div class="pkg-total-row">
      <span class="label">Total inversión</span>
      <span class="amount">€${totalOneTime.toLocaleString()}</span>
    </div>
    ${monthlyHtml}
    ${savingsHtml}
  `;
}

function saveTemplate() {
  const name = document.getElementById('pkg-name').value.trim();
  if (!name) { alert('Enter a package name'); return; }

  const selectedIds = Object.keys(builderSelected);
  if (!selectedIds.length) { alert('Select at least one service'); return; }

  // Calculate totals
  let totalOneTime = 0, totalMonthly = 0, totalBase = 0;
  const overrides = {};
  for (const id of selectedIds) {
    const ep = getEffectivePrice(id);
    totalBase += ep.base;
    if (ep.monthly) totalMonthly += ep.effective;
    else totalOneTime += ep.effective;

    if (ep.effective !== ep.base && !ep.label) {
      overrides[id] = ep.effective;
    }
    if (builderSelected[id].variant !== 'default') {
      overrides[id] = ep.effective;
    }
  }

  const tpl = {
    id: name.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    name,
    subtitle: document.getElementById('pkg-subtitle').value.trim(),
    eyebrow: document.getElementById('pkg-eyebrow').value.trim(),
    badge: document.getElementById('pkg-recommended').checked ? 'Recomendado' : null,
    promo: document.getElementById('pkg-promo').value.trim() || null,
    services: selectedIds,
    variants: { ...builderSelected },
    overrides,
    totalOneTime,
    totalMonthly,
    savings: totalBase - totalOneTime,
    source: 'manual',
    createdAt: new Date().toISOString(),
  };

  if (IS_SERVER) {
    fetch('/api/packages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(tpl)
    }).then(r => r.json()).then(result => {
      if (result.ok) {
        const idx = savedTemplates.findIndex(t => t.id === tpl.id);
        if (idx >= 0) savedTemplates[idx] = tpl;
        else savedTemplates.push(tpl);
        renderSavedTemplates();
      } else alert('Save failed: ' + result.error);
    }).catch(e => alert('Save failed: ' + e.message));
  } else {
    const idx = savedTemplates.findIndex(t => t.id === tpl.id);
    if (idx >= 0) savedTemplates[idx] = tpl;
    else savedTemplates.push(tpl);
    renderSavedTemplates();
  }
}

function renderSavedTemplates() {
  const container = document.getElementById('saved-templates');
  if (!savedTemplates.length) {
    container.innerHTML = '<p style="font-size:0.7rem;color:var(--text-dim);margin-top:1rem;text-align:center;">No saved templates yet</p>';
    return;
  }

  const sourceBadge = (src) => {
    if (src === 'ai') return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(167,139,250,0.2);color:#a78bfa;margin-left:0.4rem;">AI</span>';
    if (src === 'ai-approved') return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(74,222,128,0.2);color:#4ade80;margin-left:0.4rem;">APPROVED</span>';
    return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(240,255,61,0.15);color:var(--yellow);margin-left:0.4rem;">MANUAL</span>';
  };

  // Group by source
  const manual = savedTemplates.filter(t => t.source === 'manual' || !t.source);
  const ai = savedTemplates.filter(t => t.source === 'ai');
  const approved = savedTemplates.filter(t => t.source === 'ai-approved');

  let html = '';

  if (manual.length) {
    html += '<div style="font-size:0.7rem;font-weight:600;margin:1rem 0 0.5rem;color:var(--yellow);">Your Packages</div>';
    html += manual.map(t => templateCard(t)).join('');
  }
  if (approved.length) {
    html += '<div style="font-size:0.7rem;font-weight:600;margin:1rem 0 0.5rem;color:#4ade80;">Approved AI Packages</div>';
    html += approved.map(t => templateCard(t)).join('');
  }
  if (ai.length) {
    html += '<div style="font-size:0.7rem;font-weight:600;margin:1rem 0 0.5rem;color:#a78bfa;">AI-Generated (pending review)</div>';
    html += ai.map(t => templateCard(t)).join('');
  }

  function templateCard(t) {
    const i = savedTemplates.indexOf(t);
    const monthly = t.totalMonthly ? ` + \u20AC${t.totalMonthly}/mes` : '';
    const proposal = t.proposalId ? `<span style="font-size:0.55rem;color:var(--text-dim);"> \u2022 ${t.proposalId}</span>` : '';
    const approveBtn = t.source === 'ai'
      ? `<button onclick="event.stopPropagation();approveTemplate(${i})" style="color:#4ade80;" title="Approve">✓</button>`
      : '';
    return `<div class="saved-tpl" onclick="loadTemplate(${i})">
      <div>
        <div class="tpl-name">${t.name}${sourceBadge(t.source)}${proposal}</div>
        <div class="tpl-count">${(t.services||[]).length} services${t.badge ? ' \u2022 \u2b50' : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <div class="tpl-price">\u20AC${(t.totalOneTime||0).toLocaleString()}${monthly}</div>
        <div class="saved-tpl-actions">
          ${approveBtn}
          <button onclick="event.stopPropagation();copyTemplateJSON(${i})">JSON</button>
          <button onclick="event.stopPropagation();deleteTemplate(${i})" style="color:var(--red);">\u00d7</button>
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

async function approveTemplate(idx) {
  const t = savedTemplates[idx];
  if (!t) return;
  t.source = 'ai-approved';
  t.approvedAt = new Date().toISOString();
  if (IS_SERVER) {
    await fetch('/api/packages/' + t.id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'ai-approved', approvedAt: t.approvedAt })
    });
  }
  renderSavedTemplates();
}

function loadTemplate(idx) {
  const t = savedTemplates[idx];
  if (!t) return;
  builderSelected = {};
  for (const svcId of t.services) {
    builderSelected[svcId] = t.variants?.[svcId] || { variant: 'default', overridePrice: null };
  }
  // Need to re-render service grid to show variants
  renderBuilder();
  document.getElementById('pkg-name').value = t.name || '';
  document.getElementById('pkg-subtitle').value = t.subtitle || '';
  document.getElementById('pkg-eyebrow').value = t.eyebrow || '';
  document.getElementById('pkg-recommended').checked = !!t.badge;
  document.getElementById('pkg-promo').value = t.promo || '';
  refreshBuilder();
}

async function deleteTemplate(idx) {
  const t = savedTemplates[idx];
  if (!t) return;
  if (IS_SERVER) {
    await fetch('/api/packages/' + t.id, { method: 'DELETE' });
  }
  savedTemplates.splice(idx, 1);
  renderSavedTemplates();
}

function clearBuilder() {
  builderSelected = {};
  renderBuilder();
  document.getElementById('pkg-name').value = '';
  document.getElementById('pkg-subtitle').value = '';
  document.getElementById('pkg-eyebrow').value = '';
  document.getElementById('pkg-recommended').checked = false;
  document.getElementById('pkg-promo').value = '';
}

function exportJSON() {
  const selectedIds = Object.keys(builderSelected);
  if (!selectedIds.length) { alert('Select services first'); return; }

  let totalOneTime = 0, totalMonthly = 0;
  const overrides = {};
  for (const id of selectedIds) {
    const ep = getEffectivePrice(id);
    if (ep.monthly) totalMonthly += ep.effective;
    else totalOneTime += ep.effective;
    if (builderSelected[id].variant !== 'default') {
      const svc = SERVICES[id];
      const variantPrice = svc?.pricing?.priceVariants?.[builderSelected[id].variant];
      if (variantPrice) overrides[id] = variantPrice;
    }
  }

  const pkg = {
    id: (document.getElementById('pkg-name').value || 'package').toLowerCase().replace(/[^a-z0-9]+/g, '-'),
    name: document.getElementById('pkg-name').value || 'Package',
    subtitle: document.getElementById('pkg-subtitle').value || '',
    eyebrow: document.getElementById('pkg-eyebrow').value || '',
    badge: document.getElementById('pkg-recommended').checked ? 'Recomendado' : null,
    promo: document.getElementById('pkg-promo').value || null,
    services: selectedIds,
    totalOneTime,
    totalMonthly: totalMonthly || undefined,
    savings: undefined,
    paymentStructure: 'standard-35-25-25-15',
  };

  const json = JSON.stringify(pkg, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('Package JSON copied to clipboard!');
  }).catch(() => {
    fallbackCopy(json);
  });
}

function copyTemplateJSON(idx) {
  const t = savedTemplates[idx];
  const pkg = {
    id: t.id,
    name: t.name,
    subtitle: t.subtitle,
    eyebrow: t.eyebrow,
    badge: t.badge,
    promo: t.promo,
    services: t.services,
    totalOneTime: t.totalOneTime,
    totalMonthly: t.totalMonthly || undefined,
    savings: t.savings || undefined,
    paymentStructure: 'standard-35-25-25-15',
  };
  const json = JSON.stringify(pkg, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('Copied!');
  }).catch(() => {
    fallbackCopy(json);
  });
}

// ── Init ──
loadData();
</script>
