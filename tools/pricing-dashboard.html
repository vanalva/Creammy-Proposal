<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van Alva — Pricing Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --surface: #121212;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.1);
    --border-hover: rgba(255,255,255,0.2);
    --text: #e8e0d0;
    --text-dim: #8a8272;
    --yellow: #f0ff3d;
    --green: #4ade80;
    --red: #f87171;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --orange: #fb923c;
    --cyan: #22d3ee;
    --font-heading: 'Cascadia Code', monospace;
    --font-body: 'Inter', sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Layout ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 1.1rem; font-weight: 600; font-family: var(--font-heading); }
  .header h1 span { color: var(--yellow); }

  .tabs {
    display: flex; gap: 0.25rem;
    background: var(--surface);
    border-radius: 8px; padding: 3px;
  }
  .tab {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-dim);
    transition: all 0.2s;
    border: none; background: none;
  }
  .tab.active { background: var(--yellow); color: #000; }
  .tab:hover:not(.active) { color: var(--text); }

  .stats {
    display: flex; gap: 1.5rem; font-size: 0.75rem; color: var(--text-dim);
  }
  .stats strong { color: var(--yellow); font-variant-numeric: tabular-nums; font-family: var(--font-heading); }

  .view { display: none; padding: 2rem; }
  .view.active { display: block; }

  /* ── Cards View ── */
  .category-group { margin-bottom: 3rem; }
  .category-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .category-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .category-name { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-heading); }
  .category-count { font-size: 0.7rem; color: var(--text-dim); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .svc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
  }
  .svc-card:hover { border-color: var(--yellow); transform: translateY(-2px); }
  .svc-card.expanded { border-color: var(--yellow); }

  .svc-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
  .svc-eyebrow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 0.25rem; }
  .svc-name { font-size: 1.1rem; font-weight: 700; font-family: var(--font-heading); }
  .svc-subtitle { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }

  .svc-price-block { text-align: right; }
  .svc-base-price { font-size: 1.3rem; font-weight: 700; color: var(--yellow); font-family: var(--font-heading); }
  .svc-price-range { font-size: 0.65rem; color: var(--text-dim); }
  .svc-monthly-tag {
    display: inline-block;
    font-size: 0.6rem;
    background: rgba(240,255,61,0.15);
    color: var(--yellow);
    padding: 2px 6px;
    border-radius: 4px;
    margin-top: 4px;
  }

  .svc-timeline {
    font-size: 0.7rem; color: var(--text-dim);
    margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .svc-timeline-bar {
    flex: 1; height: 3px; background: var(--border); border-radius: 2px;
    position: relative;
  }
  .svc-timeline-fill {
    height: 100%; background: var(--yellow); border-radius: 2px;
    opacity: 0.4;
  }

  .svc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 0.75rem; }
  .svc-tag {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .svc-relations { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
  .svc-relation {
    font-size: 0.7rem;
    display: flex; align-items: center; gap: 0.4rem;
    margin-bottom: 0.35rem;
  }
  .svc-relation .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .rel-included .dot { background: var(--green); }
  .rel-free .dot { background: var(--cyan); }
  .rel-discount .dot { background: var(--orange); }
  .rel-excludes .dot { background: var(--red); }

  /* ── Variants panel ── */
  .variants-panel {
    display: none;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .svc-card.expanded .variants-panel { display: block; }
  .variant-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.75rem;
  }
  .variant-name { color: var(--text-dim); }
  .variant-price { font-weight: 600; color: var(--yellow); font-variant-numeric: tabular-nums; font-family: var(--font-heading); }

  .includes-list { margin-top: 0.5rem; }
  .includes-list summary { font-size: 0.75rem; font-weight: 600; cursor: pointer; color: var(--text-dim); }
  .includes-list li { font-size: 0.7rem; color: var(--text-dim); margin: 0.2rem 0 0.2rem 1rem; }
  .item-badge { font-size: 0.5rem; padding: 1px 4px; border-radius: 2px; margin-left: 4px; vertical-align: middle; }
  .item-qty { background: rgba(240,255,61,0.15); color: var(--yellow); }
  .item-shared { background: rgba(96,165,250,0.15); color: var(--blue); }
  .item-cond { background: rgba(167,139,250,0.15); color: var(--purple); }
  .svc-revisions { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .rev-count { color: var(--text); font-weight: 500; }
  .rev-overage { color: var(--orange); }

  /* ── Graph Filters ── */
  .graph-filters {
    display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center;
    margin-bottom: 0.75rem;
  }
  .filter-group {
    display: flex; align-items: center; gap: 0.25rem;
    background: var(--surface);
    border-radius: 6px;
    padding: 3px;
  }
  .filter-group-label {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-dim); padding: 0 0.5rem;
  }
  .filter-btn {
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text-dim);
    border: none; background: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn.active { background: var(--surface2); color: var(--text); }
  .filter-btn:hover:not(.active) { color: var(--text); }
  .filter-btn .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }
  .filter-btn-line { display: inline-block; width: 10px; height: 2px; margin-right: 4px; vertical-align: middle; }
  .filter-toggle {
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text-dim);
    border: 1px solid var(--border);
    background: var(--surface);
    transition: all 0.15s;
  }
  .filter-toggle.active { border-color: var(--yellow); color: var(--yellow); background: rgba(240,255,61,0.08); }

  /* ── Graph View ── */
  #graph-container {
    width: 100%; height: calc(100vh - 170px);
    position: relative; overflow: hidden;
    background: radial-gradient(circle at 50% 50%, #111 0%, #080808 100%);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  #graph-canvas { width: 100%; height: 100%; }

  .graph-legend {
    position: absolute; bottom: 1rem; left: 1rem;
    background: rgba(18,18,18,0.92);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.7rem;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; }
  .legend-line { width: 20px; height: 2px; }

  .graph-tooltip {
    display: none;
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--yellow);
    border-radius: 8px;
    padding: 1rem;
    max-width: 280px;
    pointer-events: none;
    z-index: 50;
  }
  .graph-tooltip.visible { display: block; }

  /* ── Matrix View ── */
  .matrix-container { overflow-x: auto; }
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }
  .matrix-table th, .matrix-table td {
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    text-align: center;
    white-space: nowrap;
  }
  .matrix-table th {
    background: var(--surface);
    font-weight: 600;
    position: sticky; top: 0; z-index: 10;
  }
  .matrix-table th:first-child { text-align: left; position: sticky; left: 0; z-index: 20; background: var(--surface); }
  .matrix-table td:first-child { text-align: left; font-weight: 500; position: sticky; left: 0; background: var(--bg); z-index: 5; }
  .matrix-table tr:hover td { background: var(--surface2); }
  .cell-included { color: var(--green); font-weight: 600; }
  .cell-free { color: var(--cyan); font-weight: 600; }
  .cell-discount { color: var(--orange); font-weight: 600; }
  .cell-normal { color: var(--text-dim); }
  .cell-none { color: rgba(255,255,255,0.12); }

  /* ── Retainer View ── */
  .retainer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
  }
  .retainer-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .retainer-tier { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
  .retainer-name { font-size: 1.2rem; font-weight: 700; margin: 0.25rem 0; font-family: var(--font-heading); }
  .retainer-price { font-size: 1.5rem; font-weight: 700; color: var(--yellow); font-family: var(--font-heading); }
  .retainer-price span { font-size: 0.8rem; font-weight: 400; color: var(--text-dim); }
  .retainer-includes { margin-top: 1rem; }
  .retainer-includes li { font-size: 0.75rem; color: var(--text-dim); margin: 0.3rem 0; list-style: none; }
  .retainer-includes li::before { content: ""; display: inline-block; width: 6px; height: 6px; background: var(--yellow); border-radius: 50%; margin-right: 0.5rem; }

  /* ── Package Builder ── */
  .builder-layout { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; min-height: calc(100vh - 120px); }
  .builder-services { min-width: 0; }
  .builder-sidebar { position: sticky; top: 80px; align-self: start; }

  .builder-svc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.75rem; }
  .builder-svc-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .builder-svc-item:hover { border-color: var(--border-hover); }
  .builder-svc-item.selected { border-color: var(--yellow); background: rgba(240,255,61,0.05); }
  .builder-svc-item.disabled { opacity: 0.3; pointer-events: none; }
  .builder-svc-item .svc-info { flex: 1; }
  .builder-svc-item .svc-info .name { font-size: 0.85rem; font-weight: 600; }
  .builder-svc-item .svc-info .cat { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .builder-svc-item .svc-price-tag { font-size: 0.85rem; font-weight: 700; color: var(--yellow); white-space: nowrap; font-family: var(--font-heading); }
  .builder-svc-item .svc-status { font-size: 0.7rem; font-weight: 600; margin-left: 0.5rem; }
  .builder-svc-item .status-included { color: var(--green); }
  .builder-svc-item .status-free { color: var(--cyan); }
  .builder-svc-item .status-discount { color: var(--orange); }

  .builder-variant-select {
    margin-top: 0.4rem;
    display: flex; gap: 0.25rem; flex-wrap: wrap;
  }
  .variant-btn {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    cursor: pointer;
  }
  .variant-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(240,255,61,0.1); }

  .pkg-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .pkg-meta-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }
  .pkg-meta-input:focus { outline: none; border-color: var(--yellow); }

  .pkg-line-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.8rem;
  }
  .pkg-line-item .effective { color: var(--yellow); font-weight: 600; font-variant-numeric: tabular-nums; }
  .pkg-line-item .original { color: var(--text-dim); text-decoration: line-through; font-size: 0.7rem; margin-right: 0.5rem; }
  .pkg-line-item .status-label { font-size: 0.65rem; font-weight: 600; }

  .pkg-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 0 0.5rem;
    border-top: 2px solid var(--yellow);
    margin-top: 0.75rem;
  }
  .pkg-total-row .label { font-weight: 600; }
  .pkg-total-row .amount { font-size: 1.4rem; font-weight: 700; color: var(--yellow); font-family: var(--font-heading); }
  .pkg-savings { font-size: 0.7rem; color: var(--green); text-align: right; }

  .pkg-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .pkg-btn {
    flex: 1;
    padding: 0.6rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: var(--font-body);
  }
  .pkg-btn-primary { background: var(--yellow); color: #000; }
  .pkg-btn-primary:hover { filter: brightness(0.9); }
  .pkg-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .pkg-btn-secondary:hover { border-color: var(--border-hover); }

  .saved-templates { margin-top: 1.5rem; }
  .saved-tpl {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .saved-tpl:hover { border-color: var(--border-hover); }
  .saved-tpl .tpl-name { font-size: 0.8rem; font-weight: 600; }
  .saved-tpl .tpl-price { font-size: 0.8rem; color: var(--yellow); font-weight: 600; }
  .saved-tpl .tpl-count { font-size: 0.65rem; color: var(--text-dim); }
  .saved-tpl-actions { display: flex; gap: 0.25rem; }
  .saved-tpl-actions button {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); cursor: pointer;
  }
  .saved-tpl-actions button:hover { color: var(--text); border-color: var(--border-hover); }
  .saved-tpl .tpl-price { font-family: var(--font-heading); }

  /* ── Inline Price Editing ── */
  .inline-price-input {
    font-family: var(--font-heading);
    font-weight: 700;
    color: var(--yellow);
    background: rgba(240,255,61,0.08);
    border: 1px solid var(--yellow);
    border-radius: 4px;
    padding: 2px 6px;
    outline: none;
    text-align: right;
    font-variant-numeric: tabular-nums;
    transition: box-shadow 0.15s;
    box-shadow: 0 0 0 2px rgba(240,255,61,0.15);
  }
  .inline-price-input.base-price-input {
    font-size: 1.3rem;
    width: 120px;
  }
  .inline-price-input.variant-price-input {
    font-size: 0.75rem;
    width: 90px;
  }

  /* ── Service Catalog View ── */
  .catalog-search {
    width: 100%; max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .catalog-search:focus { border-color: var(--yellow); }
  .catalog-search::placeholder { color: var(--text-dim); }

  .catalog-group { margin-bottom: 2.5rem; }
  .catalog-group-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 2px solid var(--border);
  }
  .catalog-group-header .cat-dot { width: 12px; height: 12px; border-radius: 50%; }
  .catalog-group-header .cat-label { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-family: var(--font-heading); }
  .catalog-group-header .cat-count { font-size: 0.7rem; color: var(--text-dim); }

  .catalog-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.75rem; overflow: hidden; transition: border-color 0.2s; }
  .catalog-item:hover { border-color: var(--border-hover); }
  .catalog-item.open { border-color: var(--yellow); }

  .catalog-item-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.25rem; cursor: pointer; gap: 1rem;
    transition: background 0.15s;
  }
  .catalog-item-header:hover { background: var(--surface2); }
  .catalog-item-header .ci-name { font-family: var(--font-heading); font-size: 0.95rem; font-weight: 600; }
  .catalog-item-header .ci-cat-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim);
  }
  .catalog-item-header .ci-cat-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .catalog-item-header .ci-price { font-family: var(--font-heading); font-weight: 700; color: var(--yellow); font-size: 1rem; white-space: nowrap; }
  .catalog-item-header .ci-monthly-tag {
    font-size: 0.55rem; background: rgba(240,255,61,0.15); color: var(--yellow);
    padding: 1px 5px; border-radius: 3px; margin-left: 4px;
  }
  .catalog-item-header .ci-default-badge {
    font-size: 0.55rem; background: rgba(74,222,128,0.15); color: var(--green);
    padding: 1px 6px; border-radius: 3px; margin-left: 6px;
  }
  .catalog-item-header .ci-chevron {
    font-size: 0.7rem; color: var(--text-dim); transition: transform 0.2s;
  }
  .catalog-item.open .ci-chevron { transform: rotate(90deg); }

  .catalog-detail { display: none; padding: 0 1.25rem 1.25rem; }
  .catalog-item.open .catalog-detail { display: block; }

  .catalog-detail .cd-section { margin-bottom: 1rem; }
  .catalog-detail .cd-section-title {
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-dim); margin-bottom: 0.4rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border);
  }

  .cd-variants-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  .cd-variants-table th { text-align: left; padding: 0.3rem 0.5rem; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); font-size: 0.65rem; text-transform: uppercase; }
  .cd-variants-table td { padding: 0.35rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .cd-variants-table .vt-price { color: var(--yellow); font-weight: 600; font-family: var(--font-heading); white-space: nowrap; }
  .cd-variants-table .vt-default { background: rgba(240,255,61,0.1); color: var(--yellow); font-size: 0.5rem; padding: 1px 5px; border-radius: 3px; font-weight: 700; margin-left: 4px; }

  .cd-include-item { font-size: 0.75rem; padding: 0.2rem 0; color: var(--text); }
  .cd-deliverable-item { font-size: 0.75rem; padding: 0.2rem 0; color: var(--text); }
  .cd-deliverable-item .fmt-badge { font-size: 0.5rem; padding: 1px 5px; border-radius: 3px; background: var(--surface2); color: var(--text-dim); margin-left: 4px; }

  .cd-bundle-row { font-size: 0.75rem; display: flex; align-items: center; gap: 0.4rem; padding: 0.2rem 0; }
  .cd-bundle-row .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .cd-tag { display: inline-block; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); margin: 2px 2px 2px 0; }

  /* ── Terms & Payments View ── */
  .terms-section { margin-bottom: 3rem; }
  .terms-section-title {
    font-size: 1.1rem; font-weight: 700; font-family: var(--font-heading);
    margin-bottom: 0.25rem;
  }
  .terms-section-sub { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1.25rem; }

  .terms-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  .terms-table th {
    text-align: left; padding: 0.5rem 0.75rem; font-weight: 600; color: var(--text-dim);
    border-bottom: 1px solid var(--border); font-size: 0.65rem; text-transform: uppercase;
    background: var(--surface); position: sticky; top: 0;
  }
  .terms-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .terms-table tr:hover td { background: var(--surface2); }

  .terms-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1.25rem; margin-bottom: 0.75rem;
  }
  .terms-card-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.25rem; }
  .terms-card-sub { font-size: 0.7rem; color: var(--text-dim); }
  .terms-card-value { font-size: 1.1rem; font-weight: 700; color: var(--yellow); font-family: var(--font-heading); margin-top: 0.5rem; }

  .terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.75rem; }

  .terms-badge-always { display: inline-block; font-size: 0.55rem; padding: 1px 6px; border-radius: 3px; background: rgba(74,222,128,0.15); color: var(--green); }
  .terms-badge-cond { display: inline-block; font-size: 0.55rem; padding: 1px 6px; border-radius: 3px; background: rgba(240,255,61,0.15); color: var(--yellow); }

  .rev-rounds-cell { font-weight: 700; color: var(--yellow); font-family: var(--font-heading); }
</style>
</head>
<body>

<div class="header">
  <h1><span>Van Alva</span> Pricing Dashboard</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchView('cards')">Cards</button>
    <button class="tab" onclick="switchView('graph')">Node Graph</button>
    <button class="tab" onclick="switchView('matrix')">Matrix</button>
    <button class="tab" onclick="switchView('retainers')">Retainers</button>
    <button class="tab" onclick="switchView('builder')">Package Builder</button>
    <button class="tab" onclick="switchView('catalog')">Service Catalog</button>
    <button class="tab" onclick="switchView('terms')">Terms</button>
  </div>
  <div class="stats" id="stats"></div>
  <div style="display:flex;gap:0.5rem;">
    <button onclick="rebuildAll()" style="padding:0.4rem 0.8rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.7rem;cursor:pointer;font-family:var(--font-body);">Rebuild All Proposals</button>
    <span id="server-status" style="font-size:0.6rem;color:var(--text-dim);align-self:center;"></span>
  </div>
</div>

<!-- ── CARDS VIEW ── -->
<div class="view active" id="view-cards"></div>

<!-- ── GRAPH VIEW ── -->
<div class="view" id="view-graph">
  <div class="graph-filters" id="graph-filters"></div>
  <div id="graph-container">
    <canvas id="graph-canvas"></canvas>
    <div class="graph-legend">
      <div class="legend-item"><div class="legend-line" style="background:var(--green)"></div> Includes</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--cyan)"></div> Free with</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--orange);border-top:2px dashed var(--orange);height:0;"></div> Discounted</div>
      <div class="legend-item"><div class="legend-line" style="background:var(--red);border-top:2px dashed var(--red);height:0;"></div> Mutually exclusive</div>
      <div style="margin-top:0.5rem;font-size:0.6rem;color:var(--text-dim);">Click node to isolate. Click background to reset.</div>
    </div>
    <div class="graph-tooltip" id="graph-tooltip"></div>
  </div>
</div>

<!-- ── MATRIX VIEW ── -->
<div class="view" id="view-matrix"></div>

<!-- ── RETAINERS VIEW ── -->
<div class="view" id="view-retainers"></div>

<!-- ── PACKAGE BUILDER VIEW ── -->
<div class="view" id="view-builder"></div>

<!-- ── SERVICE CATALOG VIEW ── -->
<div class="view" id="view-catalog"></div>

<!-- ── TERMS & PAYMENTS VIEW ── -->
<div class="view" id="view-terms"></div>

<script src="pricing-data.js"></script>
<script>
// ── Data Loading ──
let SERVICES = {};
let RETAINERS = {};
let DISCOUNTS = {};

const CATEGORY_META = {
  branding:    { label: 'Branding',          color: '#f0ff3d' },
  web:         { label: 'Web',               color: '#60a5fa' },
  social:      { label: 'Social',            color: '#a78bfa' },
  print:       { label: 'Print & Packaging', color: '#fb923c' },
  production:  { label: 'Produccion',        color: '#f87171' },
  video:       { label: 'Video',             color: '#ec4899' },
  broadcast:   { label: 'Broadcast / TV',    color: '#ef4444' },
  design:      { label: 'Diseno',            color: '#8b5cf6' },
  animation:   { label: 'Animacion',         color: '#e879f9' },
  tech:        { label: 'Tecnologia',        color: '#22d3ee' },
  specialized: { label: 'Especializado',     color: '#fbbf24' },
};

const IS_SERVER = window.location.protocol === 'http:' || window.location.protocol === 'https:';
let SERVICES_FULL = {}; // keep full data object for saving back

async function loadData() {
  if (IS_SERVER) {
    try {
      const [svcRes, retRes, discRes] = await Promise.all([
        fetch('/api/services'), fetch('/api/retainers'), fetch('/api/discounts')
      ]);
      SERVICES_FULL = await svcRes.json();
      SERVICES = SERVICES_FULL.services || {};
      RETAINERS = await retRes.json();
      DISCOUNTS = await discRes.json();
    } catch(e) {
      console.warn('API failed, falling back to embedded data:', e);
      SERVICES_FULL = typeof EMBEDDED_SERVICES !== 'undefined' ? EMBEDDED_SERVICES : {};
      SERVICES = SERVICES_FULL.services || {};
      RETAINERS = typeof EMBEDDED_RETAINERS !== 'undefined' ? EMBEDDED_RETAINERS : {};
      DISCOUNTS = typeof EMBEDDED_DISCOUNTS !== 'undefined' ? EMBEDDED_DISCOUNTS : {};
    }
  } else {
    SERVICES_FULL = typeof EMBEDDED_SERVICES !== 'undefined' ? EMBEDDED_SERVICES : {};
    SERVICES = SERVICES_FULL.services || {};
    RETAINERS = typeof EMBEDDED_RETAINERS !== 'undefined' ? EMBEDDED_RETAINERS : {};
    DISCOUNTS = typeof EMBEDDED_DISCOUNTS !== 'undefined' ? EMBEDDED_DISCOUNTS : {};
  }

  renderStats();
  renderCards();
  renderMatrix();
  renderRetainers();
  renderCatalog();
  renderTerms();
}

// ── Save helpers ──
async function saveService(svcId, patch) {
  if (!IS_SERVER) { alert('Editing requires the server. Run: node tools/server.js'); return false; }
  try {
    const res = await fetch('/api/services/' + svcId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch)
    });
    const result = await res.json();
    if (result.ok) {
      // Reload data
      await loadData();
      return true;
    } else {
      alert('Save failed: ' + result.error);
      return false;
    }
  } catch(e) { alert('Save failed: ' + e.message); return false; }
}

async function saveFullCatalog() {
  if (!IS_SERVER) { alert('Editing requires the server. Run: node tools/server.js'); return false; }
  SERVICES_FULL.services = SERVICES;
  try {
    const res = await fetch('/api/services', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(SERVICES_FULL)
    });
    const result = await res.json();
    if (!result.ok) alert('Save failed: ' + result.error);
    return result.ok;
  } catch(e) { alert('Save failed: ' + e.message); return false; }
}

async function rebuildAll() {
  if (!IS_SERVER) { alert('Rebuild requires the server. Run: node tools/server.js'); return; }
  try {
    const res = await fetch('/api/rebuild-all', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    const result = await res.json();
    if (result.ok) {
      const summary = result.results.map(r => (r.ok ? '\u2713' : '\u2717') + ' ' + r.manifest).join('\n');
      alert('Rebuild complete:\n' + summary);
    } else {
      alert('Rebuild failed: ' + result.error);
    }
  } catch(e) { alert('Rebuild failed: ' + e.message); }
}

function renderStats() {
  const svcs = Object.values(SERVICES);
  const fixed = svcs.filter(s => s.pricing.basePrice).reduce((a,s) => a + s.pricing.basePrice, 0);
  const monthly = svcs.filter(s => s.pricing.monthly);
  document.getElementById('stats').innerHTML = `
    <div><strong>${svcs.length}</strong> services</div>
    <div><strong>${monthly.length}</strong> monthly</div>
    <div>Fixed total: <strong>€${fixed.toLocaleString()}</strong></div>
  `;
}

// ── CARDS VIEW ──
function renderCards() {
  const container = document.getElementById('view-cards');

  // ── Package templates section ──
  const pkgs = savedTemplates.length ? savedTemplates : (typeof EMBEDDED_PACKAGES !== 'undefined' ? (EMBEDDED_PACKAGES.templates || []) : []);
  let html = '';

  if (pkgs.length) {
    const sourceBadge = (src) => {
      if (src === 'ai') return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(167,139,250,0.2);color:#a78bfa;">AI</span>';
      if (src === 'ai-approved') return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(74,222,128,0.2);color:#4ade80;">APPROVED</span>';
      return '<span style="font-size:0.55rem;padding:1px 6px;border-radius:3px;background:rgba(240,255,61,0.15);color:var(--yellow);">MANUAL</span>';
    };

    html += `<div class="category-group">
      <div class="category-header">
        <div class="category-dot" style="background:var(--yellow)"></div>
        <div class="category-name">Packages</div>
        <div class="category-count">${pkgs.length} template${pkgs.length > 1 ? 's' : ''}</div>
      </div>
      <div class="cards-grid">`;

    for (const pkg of pkgs) {
      const monthly = pkg.totalMonthly ? `<div style="font-size:0.75rem;color:var(--text-dim);">+ \u20AC${(pkg.totalMonthly||0).toLocaleString()}/mes</div>` : '';
      const svcNames = (pkg.services || []).map(id => SERVICES[id]?.name || id).join(', ');
      const savings = pkg.savings > 0 ? `<div style="font-size:0.65rem;color:var(--green);margin-top:0.5rem;">Ahorras \u20AC${pkg.savings.toLocaleString()}</div>` : '';
      const proposal = pkg.proposalId ? `<div style="font-size:0.6rem;color:var(--text-dim);margin-top:0.25rem;">${pkg.proposalId} \u2022 ${pkg.clientName || ''}</div>` : '';
      const badge = pkg.badge ? `<div style="position:absolute;top:0.75rem;right:0.75rem;background:var(--yellow);color:#000;font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:3px;">${pkg.badge}</div>` : '';

      html += `<div class="svc-card" style="position:relative;border-color:rgba(240,255,61,0.2);">
        ${badge}
        <div class="svc-card-top">
          <div>
            <div class="svc-eyebrow">${pkg.eyebrow || ''} ${sourceBadge(pkg.source)}</div>
            <div class="svc-name" style="color:var(--yellow);font-family:var(--font-heading);">${pkg.name}</div>
            <div class="svc-subtitle">${pkg.subtitle || ''}</div>
          </div>
          <div class="svc-price-block">
            <div class="svc-base-price">\u20AC${(pkg.totalOneTime||0).toLocaleString()}</div>
            ${monthly}
          </div>
        </div>
        <div style="font-size:0.7rem;color:var(--text-dim);margin-top:0.5rem;">${svcNames}</div>
        ${savings}
        ${proposal}
      </div>`;
    }
    html += '</div></div>';
  }

  // ── Service cards by category ──
  const groups = {};

  for (const [id, svc] of Object.entries(SERVICES)) {
    const cat = svc.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ id, ...svc });
  }

  for (const [cat, svcs] of Object.entries(groups)) {
    const meta = CATEGORY_META[cat] || { label: cat, color: '#888' };
    html += `<div class="category-group">
      <div class="category-header">
        <div class="category-dot" style="background:${meta.color}"></div>
        <div class="category-name">${meta.label}</div>
        <div class="category-count">${svcs.length} service${svcs.length > 1 ? 's' : ''}</div>
      </div>
      <div class="cards-grid">${svcs.map(s => renderCard(s, meta.color)).join('')}</div>
    </div>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.svc-card').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('expanded'));
  });
}

function renderCard(svc, catColor) {
  const p = svc.pricing;
  const price = p.basePrice ? `€${p.basePrice.toLocaleString()}` : 'Custom';
  const range = p.priceRange ? `€${p.priceRange.min.toLocaleString()} – €${p.priceRange.max.toLocaleString()}` : '';
  const monthlyTag = p.monthly ? '<div class="svc-monthly-tag">/mes</div>' : '';

  // Timeline bar (max 16 weeks scale)
  const tl = svc.timeline || {};
  const maxWeeks = 16;
  const tlMax = tl.unit === 'days' ? (tl.max || 1) / 7 : (tl.max || 0);
  const tlPct = Math.min(100, (tlMax / maxWeeks) * 100);
  const tlLabel = tl.unit === 'ongoing' ? 'Ongoing' : tl.unit === 'days' ? `${tl.min}-${tl.max} days` : `${tl.min}-${tl.max} wks`;

  // Relations
  const br = svc.bundleRules || {};
  let relations = '';
  if (br.includedWith?.length) relations += br.includedWith.map(s => `<div class="svc-relation rel-included"><div class="dot"></div>Included with ${getName(s)}</div>`).join('');
  if (br.freeWith?.length) relations += br.freeWith.map(s => `<div class="svc-relation rel-free"><div class="dot"></div>Free with ${getName(s)}</div>`).join('');
  if (br.includes?.length) relations += br.includes.map(s => `<div class="svc-relation rel-included"><div class="dot"></div>Includes ${getName(s)}</div>`).join('');
  if (br.discountedWith) {
    for (const [sid, dp] of Object.entries(br.discountedWith)) {
      relations += `<div class="svc-relation rel-discount"><div class="dot"></div>€${dp} with ${getName(sid)}</div>`;
    }
  }
  if (svc.mutuallyExclusiveWith?.length) relations += svc.mutuallyExclusiveWith.map(s => `<div class="svc-relation rel-excludes"><div class="dot"></div>Excludes ${getName(s)}</div>`).join('');

  // Variants — support both old format (number) and new format (object with price/description)
  let variants = '';
  if (p.priceVariants) {
    variants = Object.entries(p.priceVariants).map(([k,v]) => {
      const vPrice = typeof v === 'object' ? v.price : v;
      const vDesc = typeof v === 'object' ? (v.description || '') : '';
      const vCriteria = typeof v === 'object' ? (v.criteria || '') : '';
      const isDefault = p.defaultVariant === k;
      return `<div class="variant-row" style="flex-wrap:wrap;">
        <div style="flex:1;min-width:120px;">
          <span class="variant-name">${k}${isDefault ? ' <span style="color:var(--yellow);font-size:0.55rem;">DEFAULT</span>' : ''}</span>
          ${vDesc ? `<div style="font-size:0.6rem;color:var(--text-dim);margin-top:1px;">${vDesc}</div>` : ''}
          ${vCriteria ? `<div style="font-size:0.55rem;color:#555;margin-top:1px;">${vCriteria}</div>` : ''}
        </div>
        <span class="variant-price" style="cursor:${IS_SERVER ? 'pointer' : 'default'};" onclick="event.stopPropagation();${IS_SERVER ? `editVariantPrice('${svc.id}','${k}',${vPrice})` : ''}" title="${IS_SERVER ? 'Click to edit' : ''}">€${vPrice.toLocaleString()}</span>
      </div>`;
    }).join('');
  }

  // Includes
  // Includes — handle both flat strings and structured objects
  let includesList = '';
  if (svc.includes?.length) {
    const itemsHtml = svc.includes.map(item => {
      if (typeof item === 'string') return `<li>${item}</li>`;
      const text = item.quantityLabel && item.quantity != null
        ? item.quantityLabel.replace('{{quantity}}', item.quantity)
        : item.text;
      let badges = '';
      if (item.quantity != null) badges += `<span class="item-badge item-qty">${item.quantity}x</span>`;
      if (item.shared) badges += `<span class="item-badge item-shared">${item.shared}</span>`;
      if (item.condition) {
        const condLabel = item.condition.variant ? item.condition.variant.join('/') :
          item.condition.service ? 'with:' + item.condition.service :
          item.condition.notService ? 'without:' + item.condition.notService : 'cond';
        badges += `<span class="item-badge item-cond">${condLabel}</span>`;
      }
      return `<li>${text}${badges}</li>`;
    }).join('');
    const structured = svc.includes.filter(i => typeof i === 'object').length;
    const label = structured > 0 ? `${svc.includes.length} includes (${structured} structured)` : `${svc.includes.length} includes`;
    includesList = `<details class="includes-list"><summary>${label}</summary><ul>${itemsHtml}</ul></details>`;
  }

  // Revisions
  let revisionsHtml = '';
  if (svc.revisions) {
    const r = svc.revisions;
    revisionsHtml = `<div class="svc-revisions">
      <span class="rev-count">${r.rounds} revisiones</span>
      ${r.overagePrice ? `<span class="rev-overage">+\u20AC${r.overagePrice}/extra</span>` : ''}
      ${r.milestoneRevisions ? `<span style="color:var(--blue);">${Object.keys(r.milestoneRevisions).length} fases</span>` : ''}
    </div>`;
  }

  return `<div class="svc-card" data-id="${svc.id}">
    <div class="svc-card-top">
      <div>
        <div class="svc-eyebrow">${svc.eyebrow || ''}</div>
        <div class="svc-name" style="color:${catColor}">${svc.name}</div>
        <div class="svc-subtitle">${svc.subtitle || ''}</div>
      </div>
      <div class="svc-price-block">
        <div class="svc-base-price" style="cursor:${IS_SERVER ? 'pointer' : 'default'};" onclick="event.stopPropagation();${IS_SERVER ? `editBasePrice('${svc.id}',${p.basePrice || 0})` : ''}" title="${IS_SERVER ? 'Click to edit base price' : ''}">${price}</div>
        <div class="svc-price-range">${range}</div>
        ${monthlyTag}
      </div>
    </div>
    <div class="svc-timeline">
      <span>${tlLabel}</span>
      <div class="svc-timeline-bar"><div class="svc-timeline-fill" style="width:${tlPct}%"></div></div>
    </div>
    ${revisionsHtml}
    <div class="svc-tags">${(svc.tags || []).map(t => `<span class="svc-tag">${t}</span>`).join('')}</div>
    ${relations ? `<div class="svc-relations">${relations}</div>` : ''}
    <div class="variants-panel">
      ${variants ? `<div style="font-size:0.75rem;font-weight:600;margin-bottom:0.5rem;">Price Variants</div>${variants}` : ''}
      ${includesList}
    </div>
  </div>`;
}

function getName(id) {
  return SERVICES[id]?.name || id;
}

// ── MATRIX VIEW ──
function renderMatrix() {
  const container = document.getElementById('view-matrix');
  const svcs = Object.entries(SERVICES);

  // Build inclusion/discount matrix
  let html = '<div class="matrix-container"><table class="matrix-table"><thead><tr><th>Service</th>';
  html += svcs.map(([id, s]) => `<th style="writing-mode:vertical-lr;transform:rotate(180deg);max-width:40px;">${s.name}</th>`).join('');
  html += '</tr></thead><tbody>';

  for (const [rowId, rowSvc] of svcs) {
    html += `<tr><td>${rowSvc.name}</td>`;
    for (const [colId, colSvc] of svcs) {
      if (rowId === colId) {
        html += '<td style="background:var(--surface2);">—</td>';
        continue;
      }
      const rel = getRelation(rowId, colId);
      html += `<td class="${rel.cls}">${rel.label}</td>`;
    }
    html += '</tr>';
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function getRelation(fromId, toId) {
  const from = SERVICES[fromId];
  const to = SERVICES[toId];
  if (!from || !to) return { cls: 'cell-none', label: '' };

  const br = from.bundleRules || {};
  if (br.includes?.includes(toId)) return { cls: 'cell-included', label: 'INC' };
  if (br.includedWith?.includes(toId)) return { cls: 'cell-included', label: 'INC' };
  if (br.freeWith?.includes(toId)) return { cls: 'cell-free', label: 'FREE' };
  if (br.discountedWith?.[toId]) return { cls: 'cell-discount', label: `€${br.discountedWith[toId]}` };
  if (from.mutuallyExclusiveWith?.includes(toId)) return { cls: '', label: '<span style="color:var(--red)">X</span>' };

  return { cls: 'cell-none', label: '' };
}

// ── RETAINERS VIEW ──
function renderRetainers() {
  const container = document.getElementById('view-retainers');

  // Walk all templates and collect tiers
  const templates = RETAINERS.templates || {};
  let allTiers = [];
  for (const [tplId, tpl] of Object.entries(templates)) {
    const tiersObj = tpl.tiers || {};
    for (const [tierId, tier] of Object.entries(tiersObj)) {
      allTiers.push({ ...tier, id: tierId, templateName: tpl.name || tplId });
    }
  }
  // Sort by price
  allTiers.sort((a, b) => (a.price || 0) - (b.price || 0));

  if (!allTiers.length) {
    container.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:4rem;">No retainer data found in retainers.json</p>';
    return;
  }

  let html = '<h2 style="font-size:1.2rem;margin-bottom:0.5rem;">Retainer Tiers — Monthly Creative Subscription</h2>';

// ── Inline Editing ──
function editBasePrice(svcId, currentPrice) {
  if (!IS_SERVER) return;
  // Find the price element that was clicked
  const card = document.querySelector(`.svc-card[data-id="${svcId}"]`);
  if (!card) return;
  const priceEl = card.querySelector('.svc-base-price');
  if (!priceEl || priceEl.querySelector('.inline-price-input')) return; // already editing

  const originalText = priceEl.textContent;
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'inline-price-input base-price-input';
  input.value = currentPrice;
  input.min = '0';
  input.step = 'any';

  priceEl.textContent = '';
  priceEl.appendChild(input);
  input.focus();
  input.select();

  let saved = false;
  async function commit() {
    if (saved) return;
    saved = true;
    const newPrice = parseFloat(input.value);
    if (isNaN(newPrice) || newPrice < 0) {
      priceEl.textContent = originalText;
      return;
    }
    if (newPrice === currentPrice) {
      priceEl.textContent = originalText;
      return;
    }
    priceEl.textContent = `€${newPrice.toLocaleString()}`;
    await saveService(svcId, { pricing: { basePrice: newPrice } });
  }
  function cancel() {
    if (saved) return;
    saved = true;
    priceEl.textContent = originalText;
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); input.remove(); }
  });
}

function editVariantPrice(svcId, variantKey, currentPrice) {
  if (!IS_SERVER) return;
  const svc = SERVICES[svcId];
  const variant = svc?.pricing?.priceVariants?.[variantKey];

  // Find the specific variant price span inside this card
  const card = document.querySelector(`.svc-card[data-id="${svcId}"]`);
  if (!card) return;
  // Find the variant-price span that contains the matching price and is for this variant
  const priceSpans = card.querySelectorAll('.variant-price');
  let priceEl = null;
  for (const span of priceSpans) {
    if (span.getAttribute('onclick')?.includes(`'${variantKey}'`) && !span.querySelector('.inline-price-input')) {
      priceEl = span;
      break;
    }
  }
  if (!priceEl) return;

  const originalText = priceEl.textContent;
  const input = document.createElement('input');
  input.type = 'number';
  input.className = 'inline-price-input variant-price-input';
  input.value = currentPrice;
  input.min = '0';
  input.step = 'any';

  priceEl.textContent = '';
  priceEl.appendChild(input);
  input.focus();
  input.select();

  let saved = false;
  async function commit() {
    if (saved) return;
    saved = true;
    const newPrice = parseFloat(input.value);
    if (isNaN(newPrice) || newPrice < 0) {
      priceEl.textContent = originalText;
      return;
    }
    if (newPrice === currentPrice) {
      priceEl.textContent = originalText;
      return;
    }
    priceEl.textContent = `€${newPrice.toLocaleString()}`;
    // Build patch — handle both old (number) and new (object) format
    const patch = { pricing: { priceVariants: {} } };
    if (typeof variant === 'object') {
      patch.pricing.priceVariants[variantKey] = { ...variant, price: newPrice };
    } else {
      patch.pricing.priceVariants[variantKey] = newPrice;
    }
    await saveService(svcId, patch);
  }
  function cancel() {
    if (saved) return;
    saved = true;
    priceEl.textContent = originalText;
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); cancel(); input.remove(); }
  });
}

// ── Fallback copy (replaces prompt-based copy) ──
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:60vw;height:40vh;z-index:9999;font-family:var(--font-heading);font-size:0.75rem;background:var(--surface);color:var(--text);border:1px solid var(--yellow);border-radius:8px;padding:1rem;resize:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { ta.remove(); }
  });
  ta.addEventListener('blur', () => { setTimeout(() => ta.remove(), 200); });
}

// ── SERVICE CATALOG VIEW ──
function renderCatalog() {
  const container = document.getElementById('view-catalog');
  const groups = {};
  for (const [id, svc] of Object.entries(SERVICES)) {
    const cat = svc.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ id, ...svc });
  }

  let html = '<input type="text" class="catalog-search" id="catalog-search" placeholder="Search services by name, category, or tags..." oninput="filterCatalog()">';

  const catOrder = Object.keys(CATEGORY_META);
  const sortedCats = Object.keys(groups).sort((a, b) => {
    const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  for (const cat of sortedCats) {
    const svcs = groups[cat];
    const meta = CATEGORY_META[cat] || { label: cat, color: '#888' };
    html += `<div class="catalog-group" data-cat="${cat}">
      <div class="catalog-group-header" style="border-bottom-color:${meta.color}40;">
        <div class="cat-dot" style="background:${meta.color}"></div>
        <div class="cat-label" style="color:${meta.color}">${meta.label}</div>
        <div class="cat-count">${svcs.length} service${svcs.length > 1 ? 's' : ''}</div>
      </div>`;

    for (const svc of svcs) {
      const p = svc.pricing;
      const price = p.basePrice ? `\u20AC${p.basePrice.toLocaleString()}` : 'Custom';
      const monthlyTag = p.monthly ? '<span class="ci-monthly-tag">/mes</span>' : '';
      const defaultBadge = p.defaultVariant ? `<span class="ci-default-badge">${p.defaultVariant}</span>` : '';
      const tagsData = (svc.tags || []).join(',').toLowerCase();

      html += `<div class="catalog-item" data-name="${svc.name.toLowerCase()}" data-cat="${cat}" data-tags="${tagsData}">
        <div class="catalog-item-header" onclick="this.parentElement.classList.toggle('open')">
          <div style="display:flex;align-items:center;gap:0.75rem;flex:1;min-width:0;">
            <span class="ci-name">${svc.name}</span>
            <span class="ci-cat-badge"><span class="dot" style="background:${meta.color}"></span>${meta.label}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <span class="ci-price">${price}${monthlyTag}</span>
            ${defaultBadge}
            <span class="ci-chevron">\u25B6</span>
          </div>
        </div>
        <div class="catalog-detail">
          ${renderCatalogVariants(svc)}
          ${renderCatalogIncludes(svc)}
          ${renderCatalogDeliverables(svc)}
          ${renderCatalogRevisions(svc)}
          ${renderCatalogTimeline(svc)}
          ${renderCatalogBundleRules(svc)}
          ${renderCatalogExclusions(svc)}
          ${renderCatalogTags(svc)}
        </div>
      </div>`;
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

function filterCatalog() {
  const q = document.getElementById('catalog-search').value.toLowerCase().trim();
  const items = document.querySelectorAll('#view-catalog .catalog-item');
  const groups = document.querySelectorAll('#view-catalog .catalog-group');

  items.forEach(item => {
    if (!q) { item.style.display = ''; return; }
    const name = item.dataset.name || '';
    const cat = item.dataset.cat || '';
    const tags = item.dataset.tags || '';
    const catMeta = CATEGORY_META[cat];
    const catLabel = catMeta ? catMeta.label.toLowerCase() : cat;
    const match = name.includes(q) || cat.includes(q) || catLabel.includes(q) || tags.includes(q);
    item.style.display = match ? '' : 'none';
  });

  // Hide empty groups
  groups.forEach(group => {
    const visible = group.querySelectorAll('.catalog-item:not([style*="display: none"])');
    group.style.display = visible.length ? '' : 'none';
  });
}

function renderCatalogVariants(svc) {
  const p = svc.pricing;
  if (!p.priceVariants || !Object.keys(p.priceVariants).length) return '';
  let rows = '';
  for (const [k, v] of Object.entries(p.priceVariants)) {
    const vPrice = typeof v === 'object' ? v.price : v;
    const vDesc = typeof v === 'object' ? (v.description || '') : '';
    const vCriteria = typeof v === 'object' ? (v.criteria || '') : '';
    const isDefault = p.defaultVariant === k;
    const defaultMark = isDefault ? '<span class="vt-default">DEFAULT</span>' : '';
    rows += `<tr>
      <td>${k}${defaultMark}</td>
      <td class="vt-price">\u20AC${vPrice.toLocaleString()}</td>
      <td style="color:var(--text-dim);">${vDesc}</td>
      <td style="color:var(--text-dim);font-size:0.65rem;">${vCriteria}</td>
    </tr>`;
  }
  return `<div class="cd-section">
    <div class="cd-section-title">Price Variants</div>
    <table class="cd-variants-table">
      <thead><tr><th>Variant</th><th>Price</th><th>Description</th><th>Criteria</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderCatalogIncludes(svc) {
  if (!svc.includes?.length) return '';
  const itemsHtml = svc.includes.map(item => {
    if (typeof item === 'string') return `<div class="cd-include-item">\u2022 ${item}</div>`;
    const text = item.quantityLabel && item.quantity != null
      ? item.quantityLabel.replace('{{quantity}}', item.quantity)
      : (item.text || item.id || '');
    let badges = '';
    if (item.quantity != null) badges += `<span class="item-badge item-qty">${item.quantity}x</span>`;
    if (item.shared) badges += `<span class="item-badge item-shared">${item.shared}</span>`;
    if (item.condition) {
      const condLabel = item.condition.variant ? item.condition.variant.join('/') :
        item.condition.service ? 'with:' + item.condition.service :
        item.condition.notService ? 'without:' + item.condition.notService : 'cond';
      badges += `<span class="item-badge item-cond">${condLabel}</span>`;
    }
    return `<div class="cd-include-item">\u2022 ${text}${badges}</div>`;
  }).join('');
  return `<div class="cd-section">
    <div class="cd-section-title">Includes (${svc.includes.length})</div>
    ${itemsHtml}
  </div>`;
}

function renderCatalogDeliverables(svc) {
  if (!svc.deliverables?.length) return '';
  const itemsHtml = svc.deliverables.map(d => {
    const text = typeof d === 'string' ? d : (d.text || d.name || d.id || '');
    let badges = '';
    if (typeof d === 'object') {
      if (d.format) badges += `<span class="cd-deliverable-item fmt-badge">${d.format}</span>`;
      if (d.shared) badges += `<span class="item-badge item-shared">${d.shared}</span>`;
    }
    return `<div class="cd-deliverable-item">\u2022 ${text}${badges}</div>`;
  }).join('');
  return `<div class="cd-section">
    <div class="cd-section-title">Deliverables (${svc.deliverables.length})</div>
    ${itemsHtml}
  </div>`;
}

function renderCatalogRevisions(svc) {
  if (!svc.revisions) return '';
  const r = svc.revisions;
  let html = `<div style="font-size:0.75rem;"><strong>Rounds:</strong> ${r.rounds}`;
  if (r.scope) html += ` &mdash; <span style="color:var(--text-dim);">Scope: ${r.scope}</span>`;
  html += '</div>';
  if (r.outOfScope) html += `<div style="font-size:0.7rem;color:var(--text-dim);">Out of scope: ${r.outOfScope}</div>`;
  if (r.overagePrice) html += `<div style="font-size:0.7rem;color:var(--orange);">Overage: +\u20AC${r.overagePrice}/extra</div>`;
  if (r.milestoneRevisions) {
    html += '<div style="font-size:0.7rem;margin-top:0.3rem;color:var(--blue);">Milestone revisions:</div>';
    for (const [phase, count] of Object.entries(r.milestoneRevisions)) {
      html += `<div style="font-size:0.65rem;color:var(--text-dim);margin-left:0.75rem;">${phase}: ${count} rounds</div>`;
    }
  }
  return `<div class="cd-section"><div class="cd-section-title">Revisions</div>${html}</div>`;
}

function renderCatalogTimeline(svc) {
  const tl = svc.timeline;
  if (!tl) return '';
  let html = `<div style="font-size:0.75rem;">${tl.min}\u2013${tl.max} ${tl.unit || 'weeks'}</div>`;
  if (tl.milestones) {
    html += '<div style="margin-top:0.3rem;">';
    for (const ms of tl.milestones) {
      const name = typeof ms === 'string' ? ms : (ms.name || ms.phase || '');
      const deps = (typeof ms === 'object' && ms.dependsOn) ? ` <span style="font-size:0.6rem;color:var(--text-dim);">depends on: ${ms.dependsOn.join(', ')}</span>` : '';
      const dur = (typeof ms === 'object' && ms.duration) ? ` <span style="font-size:0.6rem;color:var(--yellow);">${ms.duration}</span>` : '';
      html += `<div style="font-size:0.7rem;color:var(--text-dim);margin-left:0.75rem;">\u2022 ${name}${dur}${deps}</div>`;
    }
    html += '</div>';
  }
  return `<div class="cd-section"><div class="cd-section-title">Timeline</div>${html}</div>`;
}

function renderCatalogBundleRules(svc) {
  const br = svc.bundleRules || {};
  const parts = [];
  if (br.includes?.length) parts.push(...br.includes.map(s => `<div class="cd-bundle-row"><div class="dot" style="background:var(--green)"></div><span style="color:var(--green);font-size:0.6rem;font-weight:600;">INCLUDES</span> ${getName(s)}</div>`));
  if (br.includedWith?.length) parts.push(...br.includedWith.map(s => `<div class="cd-bundle-row"><div class="dot" style="background:var(--green)"></div><span style="color:var(--green);font-size:0.6rem;font-weight:600;">INCLUDED WITH</span> ${getName(s)}</div>`));
  if (br.freeWith?.length) parts.push(...br.freeWith.map(s => `<div class="cd-bundle-row"><div class="dot" style="background:var(--cyan)"></div><span style="color:var(--cyan);font-size:0.6rem;font-weight:600;">FREE WITH</span> ${getName(s)}</div>`));
  if (br.discountedWith) {
    for (const [sid, dp] of Object.entries(br.discountedWith)) {
      parts.push(`<div class="cd-bundle-row"><div class="dot" style="background:var(--orange)"></div><span style="color:var(--orange);font-size:0.6rem;font-weight:600;">DISCOUNTED</span> \u20AC${dp} with ${getName(sid)}</div>`);
    }
  }
  if (br.promoWith) {
    for (const [sid, promo] of Object.entries(br.promoWith)) {
      const label = typeof promo === 'object' ? (promo.label || JSON.stringify(promo)) : promo;
      parts.push(`<div class="cd-bundle-row"><div class="dot" style="background:var(--purple)"></div><span style="color:var(--purple);font-size:0.6rem;font-weight:600;">PROMO</span> ${label} with ${getName(sid)}</div>`);
    }
  }
  if (br.requiresOneOf?.length) parts.push(`<div class="cd-bundle-row"><div class="dot" style="background:var(--text-dim)"></div><span style="color:var(--text-dim);font-size:0.6rem;font-weight:600;">REQUIRES ONE OF</span> ${br.requiresOneOf.map(s => getName(s)).join(', ')}</div>`);
  if (!parts.length) return '';
  return `<div class="cd-section"><div class="cd-section-title">Bundle Rules</div>${parts.join('')}</div>`;
}

function renderCatalogExclusions(svc) {
  if (!svc.mutuallyExclusiveWith?.length) return '';
  const items = svc.mutuallyExclusiveWith.map(s => `<div class="cd-bundle-row"><div class="dot" style="background:var(--red)"></div><span style="color:var(--red);">${getName(s)}</span></div>`).join('');
  return `<div class="cd-section"><div class="cd-section-title">Mutual Exclusions</div>${items}</div>`;
}

function renderCatalogTags(svc) {
  if (!svc.tags?.length) return '';
  return `<div class="cd-section"><div class="cd-section-title">Tags</div><div>${svc.tags.map(t => `<span class="cd-tag">${t}</span>`).join('')}</div></div>`;
}

  container.innerHTML = html;
